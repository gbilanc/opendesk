name: Build Standalone

# Builds standalone executables via PyInstaller.
# Triggered manually or automatically when a release is published.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.2.3)'
        required: false
        default: ''
  release:
    types: [published]

jobs:
  standalone:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python pin 3.12

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python deps
        run: uv sync

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      - name: Build with PyInstaller
        run: uv run pyinstaller opendesk.spec --clean

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: opendesk-standalone-${{ runner.os }}
          path: dist/opendesk/
          retention-days: 30

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/opendesk/**
